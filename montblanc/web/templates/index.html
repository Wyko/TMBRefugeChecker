<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TMB Refuge Checker</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <h1>Tour du Mont Blanc &mdash; Refuge Availability Checker</h1>
    </header>

    <div id="controls">
        <div class="control-group">
            <label for="date-preset">Date Range</label>
            <select id="date-preset">
                <option value="summer">Summer 2026 (Jun&ndash;Sep)</option>
                <option value="3months">Next 3 Months</option>
                <option value="custom">Custom</option>
            </select>
        </div>
        <div class="control-group" id="custom-dates" style="display:none">
            <label for="start-date">Start</label>
            <input type="date" id="start-date">
            <label for="end-date">End</label>
            <input type="date" id="end-date">
        </div>
        <div class="control-group">
            <label for="min-places">Min Places</label>
            <input type="number" id="min-places" value="1" min="1" max="50">
        </div>
        <div class="control-group">
            <label for="daily-km">Daily Distance (km)</label>
            <input type="number" id="daily-km" value="15" min="1" max="100" step="1">
        </div>
        <button id="check-btn" disabled>Check Availability</button>
        <button id="save-btn" title="Save current night selections">Save</button>
        <button id="load-btn" title="Load saved night selections">Load</button>
        <button id="refresh-btn" title="Force refresh availability data">Refresh &#x21bb;</button>
    </div>

    <div id="main">
        <section id="refuge-panel">
            <h2>Refuges <span id="refuge-count"></span></h2>
            <p class="hint">Drag refuges into groups on the right</p>
            <input type="text" id="refuge-filter" placeholder="Filter refuges…">
            <div id="refuge-list"></div>
        </section>

        <section id="group-panel">
            <h2>Nights</h2>
            <div id="groups"></div>
            <button id="add-group-btn">+ Add Night</button>
        </section>

        <section id="results-panel">
            <h2>Viable Starting Dates</h2>
            <div id="results-status"></div>
            <div id="results-table-wrap">
                <table id="results-table">
                    <thead id="results-head"></thead>
                    <tbody id="results-body"></tbody>
                </table>
            </div>
        </section>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
